name: Daily Fishing Report

on:
  schedule:
    # 11:00 UTC = 7am EDT (summer) / 6am EST (winter). Accepted drift.
    - cron: '0 11 * * *'
  workflow_dispatch: {}

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate report with Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        with:
          claude_args: |
            --model claude-opus-4-7
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Bash(date:*)"
          prompt: |
            You are generating today's Marco Island Fishing Report. Run the full routine end-to-end.

            1. Read `template.html` from the repo root. It contains five placeholders you must replace:
               `<!--DATE-->`, `<!--OVERVIEW-->`, `<!--CATCHES-->`, `<!--BREAKDOWN-->`, `<!--SCRIPT-->`.
            2. Use WebSearch (2 searches total) to pull recent Marco Island / Naples / Ten Thousand Islands
               fishing intel. Prefer sources like naplesfishingcharters.org, swflguideservice.com,
               fishingbooker.com, snookhookerfishing.com, naplesgonefishin.com, and local guide blogs.
            3. Build these five strings:
               - DATE: today's date in "Month D, YYYY" format (America/New_York timezone).
               - OVERVIEW: 3-4 plain-text sentences summarizing this week's bite.
               - CATCHES_HTML: exactly 5 `<div class="catch-card">` blocks. Each contains
                 `.catch-top > div > .catch-who + .catch-loc`, then `.catch-date` inside
                 `.catch-top`, then `.catch-tags` (spans with class `ct`), `.catch-text`, `.catch-src`.
               - BREAKDOWN_HTML: exactly 3 `<div class="section-card">` sections (Inshore, Nearshore,
                 Backwater). Each has `.sec-hdr` (h2 + chevron) and `.sec-body` with `.sp-row` entries.
                 Each sp-row has `.sp-name-row` (`.sp-name` + `.rating` with class `HOT`/`GOOD`/`SLOW`
                 and an emoji) and `.sp-detail`.
               - SCRIPT_TEXT: 250-320 word first-person spoken script for a D-ID avatar. Conversational
                 tone, opens with "Hey there, anglers", covers inshore/backcountry/nearshore, closes with
                 "Tight lines." Plain text with double-newline paragraph breaks; spell out numbers.
            4. Replace each placeholder in the template with the corresponding string and Write the result
               to `index.html` in the repo root.
            5. Report the final word count of SCRIPT_TEXT and the byte size of index.html.

            Do NOT commit or push; a later workflow step handles that.

      - name: Commit and push index.html
        run: |
          git config user.name 'marco-report-bot'
          git config user.email 'marco-report-bot@users.noreply.github.com'
          if git diff --quiet -- index.html; then
            echo 'No changes to index.html; skipping commit.'
            exit 0
          fi
          TODAY=$(TZ=America/New_York date '+%B %-d, %Y')
          git add index.html
          git commit -m "Daily report: ${TODAY}"
          git push origin main
